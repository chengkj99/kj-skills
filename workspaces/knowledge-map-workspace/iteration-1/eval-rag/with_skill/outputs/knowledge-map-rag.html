<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识地图</title>
<style>
  /* ============================================================
     主题配色令牌 —— 切换 body 的 data-theme 即可整体换色
     ============================================================ */
  :root {
    --font: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    /* 6 个列/分组的强调色，按顺序循环使用 */
    --c1: #3b82f6; /* 蓝 */
    --c2: #22c55e; /* 绿 */
    --c3: #a855f7; /* 紫 */
    --c4: #f97316; /* 橙 */
    --c5: #eab308; /* 金 */
    --c6: #06b6d4; /* 青 */
  }
  body[data-theme="dark"] {
    --bg-1: #0a0e1a;
    --bg-2: #0d1528;
    --card-bg: rgba(255, 255, 255, 0.03);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-1: #f1f5f9;
    --text-2: #94a3b8;
    --text-3: #64748b;
    --panel-bg: rgba(255, 255, 255, 0.02);
  }
  body[data-theme="midnight"] {
    --bg-1: #0b1020;
    --bg-2: #141b34;
    --card-bg: rgba(255, 255, 255, 0.04);
    --card-border: rgba(148, 163, 184, 0.14);
    --text-1: #e8edf7;
    --text-2: #9aa7c0;
    --text-3: #6b7894;
    --panel-bg: rgba(255, 255, 255, 0.025);
  }
  body[data-theme="ink"] {
    --bg-1: #141414;
    --bg-2: #1d1d1f;
    --card-bg: rgba(255, 255, 255, 0.035);
    --card-border: rgba(255, 255, 255, 0.1);
    --text-1: #f5f5f7;
    --text-2: #a1a1a6;
    --text-3: #6e6e73;
    --panel-bg: rgba(255, 255, 255, 0.02);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: radial-gradient(120% 120% at 50% 0%, var(--bg-2) 0%, var(--bg-1) 60%);
    color: var(--text-1);
    -webkit-font-smoothing: antialiased;
    padding: 0;
  }
  #map {
    width: 1200px;
    margin: 0 auto;
    padding: 48px 40px 32px;
  }

  /* ---------- 顶部标题 ---------- */
  .km-header { text-align: center; margin-bottom: 28px; }
  .km-title {
    font-size: 40px; font-weight: 800; letter-spacing: 0.5px;
    line-height: 1.25;
    background: linear-gradient(90deg, var(--c1), var(--c3), var(--c4));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .km-subtitle { font-size: 15px; color: var(--text-2); margin-top: 12px; }

  /* ---------- 阶段流程条 ---------- */
  .km-flow {
    display: flex; align-items: stretch; gap: 0;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 14px 8px; margin-bottom: 32px;
  }
  .km-flow-step {
    flex: 1; display: flex; flex-direction: column; gap: 3px;
    padding: 6px 14px; position: relative;
  }
  .km-flow-step:not(:last-child)::after {
    content: "›"; position: absolute; right: -6px; top: 50%;
    transform: translateY(-50%); color: var(--text-3);
    font-size: 22px; font-weight: 700;
  }
  .km-flow-head { display: flex; align-items: center; gap: 7px; }
  .km-flow-icon { font-size: 15px; opacity: 0.9; }
  .km-flow-title { font-size: 14px; font-weight: 700; }
  .km-flow-desc { font-size: 11px; color: var(--text-3); padding-left: 2px; }

  /* ---------- 区块标题 ---------- */
  .km-section-h {
    font-size: 20px; font-weight: 800; margin: 4px 0 18px;
  }
  .km-section-h span { font-size: 14px; font-weight: 500; color: var(--text-3); }

  /* ---------- 主网格 ---------- */
  .km-grid {
    display: grid; gap: 14px; margin-bottom: 36px;
  }
  .km-col {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-top: 3px solid var(--accent);
    border-radius: 12px; padding: 16px 14px;
  }
  .km-col-h { text-align: center; margin-bottom: 14px; }
  .km-col-title { font-size: 16px; font-weight: 800; color: var(--accent); }
  .km-col-sub { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .km-item {
    display: flex; gap: 9px; align-items: flex-start;
    padding: 8px 0; border-top: 1px solid var(--card-border);
  }
  .km-item:first-of-type { border-top: none; }
  .km-badge {
    flex: none; width: 18px; height: 18px; border-radius: 5px;
    background: color-mix(in srgb, var(--accent) 22%, transparent);
    color: var(--accent); font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .km-item-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .km-item-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ---------- 增强标签 ---------- */
  .km-tags { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 36px; }
  .km-tag {
    flex: 1 1 160px; min-width: 150px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-left: 3px solid var(--accent);
    border-radius: 10px; padding: 12px 14px;
  }
  .km-tag-title { font-size: 13px; font-weight: 700; }
  .km-tag-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  /* ---------- 工作流面板 ---------- */
  .km-workflows { display: grid; gap: 14px; margin-bottom: 36px; }
  .km-wf {
    background: var(--panel-bg);
    border: 1px solid var(--accent);
    border-radius: 12px; padding: 16px 16px 14px;
  }
  .km-wf-title { font-size: 16px; font-weight: 800; color: var(--accent); text-align: center; }
  .km-wf-flow { font-size: 11px; color: var(--text-3); text-align: center; margin: 6px 0 12px; }
  .km-wf-step { display: flex; gap: 9px; align-items: center; padding: 4px 0; font-size: 13px; }
  .km-wf-num { color: var(--accent); font-weight: 700; font-size: 12px; min-width: 16px; }

  /* ---------- 底部建议框 ---------- */
  .km-advice { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .km-ad {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 18px 18px;
  }
  .km-ad-title { font-size: 15px; font-weight: 800; margin-bottom: 12px; }
  .km-ad-item { display: flex; gap: 9px; align-items: flex-start; font-size: 13px; color: var(--text-2); padding: 5px 0; }
  .km-ad-icon { flex: none; }

  /* ---------- 页脚 ---------- */
  .km-footer {
    text-align: center; font-size: 14px; color: var(--text-2);
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 16px;
  }
</style>
</head>
<body data-theme="dark">
  <div id="map"></div>

<script>
/* ============================================================
   填充区：把内容替换成你调研后的真实数据即可。
   - flow / columns / workflows / advice 的数量可变，框架自动排版。
   - 强调色按 columns 顺序循环 c1..c6，无需手填颜色。
   ============================================================ */
const DATA = {
  theme: "midnight",                   // dark | midnight | ink
  title: "RAG 应用开发全景知识地图",
  subtitle: "从『文档摄取 → 切分 → 嵌入索引 → 检索重排 → 生成 → 评估上线』全链路覆盖，把检索增强生成做到生产可用",

  // 阶段流程条（建议 5-6 个）
  flow: [
    { icon: "📥", index: "1", title: "数据摄取", desc: "加载 · 解析 · 清洗" },
    { icon: "✂️", index: "2", title: "切分", desc: "分块 · 重叠 · 元数据" },
    { icon: "🧮", index: "3", title: "嵌入索引", desc: "向量化 · 入库" },
    { icon: "🔎", index: "4", title: "检索重排", desc: "召回 · 混合 · rerank" },
    { icon: "✍️", index: "5", title: "生成", desc: "组装上下文 · 引用" },
    { icon: "📊", index: "6", title: "评估上线", desc: "指标 · 观测 · 迭代" }
  ],

  // 主网格区块标题 + 各列内容（列数可变，建议 4-6 列）
  columnsHeading: "六大核心环节",
  columnsHeadingSub: "（每环节主流方案）",
  columns: [
    { index: "1", title: "数据摄取", sub: "把原始资料变成干净文本", items: [
      { name: "Unstructured", desc: "多格式文档解析" },
      { name: "LlamaParse", desc: "复杂 PDF / 表格解析" },
      { name: "Firecrawl", desc: "网页抓取转 Markdown" },
      { name: "OCR / VLM", desc: "扫描件与图片识别" }
    ]},
    { index: "2", title: "切分", sub: "决定可检索内容的上限", items: [
      { name: "Recursive Splitter", desc: "按分隔符递归切" },
      { name: "Semantic Chunking", desc: "按语义边界分块" },
      { name: "Late Chunking", desc: "长上下文后池化" },
      { name: "Parent-Child", desc: "小块检索大块喂入" }
    ]},
    { index: "3", title: "嵌入索引", sub: "把文本编码并存入向量库", items: [
      { name: "text-embedding-3", desc: "OpenAI 通用嵌入" },
      { name: "voyage-3 / BGE-M3", desc: "检索向量首选" },
      { name: "pgvector / Qdrant", desc: "向量库主力选型" },
      { name: "Pinecone / Milvus", desc: "托管与超大规模" }
    ]},
    { index: "4", title: "检索重排", sub: "把最相关内容捞到最前", items: [
      { name: "Hybrid Search", desc: "向量 + BM25 融合" },
      { name: "Query Rewrite", desc: "改写 · 分解 · HyDE" },
      { name: "Reranker", desc: "cross-encoder 精排" },
      { name: "GraphRAG", desc: "知识图谱多跳" }
    ]},
    { index: "5", title: "生成", sub: "组装上下文产出可信答案", items: [
      { name: "Prompt 工程", desc: "系统提示 · 约束" },
      { name: "Grounding", desc: "强制基于检索作答" },
      { name: "Citations", desc: "回答附来源引用" },
      { name: "Guardrails", desc: "防幻觉 · 兜底" }
    ]},
    { index: "6", title: "评估上线", sub: "持续度量与可观测", items: [
      { name: "RAGAS", desc: "无参考自动评测" },
      { name: "TruLens / DeepEval", desc: "RAG 三元组 · CI" },
      { name: "Arize Phoenix", desc: "链路追踪与漂移" },
      { name: "LangSmith", desc: "实验与生产监控" }
    ]}
  ],

  // 可选增强标签（不需要可设为 []）
  tagsHeading: "进阶模式与技术",
  tagsHeadingSub: "（按需组合）",
  tags: [
    { title: "Agentic RAG", sub: "规划 · 反思 · 多步检索" },
    { title: "RRF 融合排序", sub: "倒数排名融合多路召回" },
    { title: "Contextual Retrieval", sub: "块前置上下文提升命中" },
    { title: "Self-RAG", sub: "自我检索与自我校正" },
    { title: "Multi-Query", sub: "多视角查询扩展召回" },
    { title: "Metadata Filter", sub: "结构化过滤缩小范围" }
  ],

  // 实战工作流（不需要可设为 []）
  workflowsHeading: "实战打法",
  workflowsHeadingSub: "（公认组合）",
  workflows: [
    { title: "MVP 快速原型", flow: "加载 → 切分 → 嵌入 → 向量检索 → 生成",
      steps: ["LlamaIndex", "Recursive Splitter", "text-embedding-3-small", "Chroma / pgvector", "Top-K 检索", "LLM 直接生成"] },
    { title: "生产高质量检索", flow: "解析 → 语义切分 → 混合检索 → 重排 → 引用生成",
      steps: ["Unstructured + LlamaParse", "Semantic / Parent-Child", "Hybrid Search + RRF", "Reranker 精排", "Grounding + Citations", "Guardrails 兜底"] },
    { title: "可评估可迭代闭环", flow: "构造评测集 → 离线评估 → 上线观测 → CI 质量门 → 迭代",
      steps: ["黄金问答集", "RAGAS 四指标", "Arize Phoenix 追踪", "LangSmith 监控", "CI/CD 质量门禁", "反馈驱动优化"] }
  ],

  // 底部建议框（建议 3 个，icon 用 emoji）
  advice: [
    { icon: "✅", title: "落地建议", items: ["先跑通最小链路，再逐环节增强，别一上来堆技术", "检索质量是上限：切分与召回比换大模型更值得投入", "reranking 通常是性价比最高的一步增强", "上线前务必建评测集，别凭感觉调参"] },
    { icon: "⭐", title: "适用场景", items: ["企业知识库问答：内部文档 + 权限受控检索", "客服与文档助手：基于产品资料给出带引用答案", "研报 / 法务 / 医疗：强溯源、低幻觉的专业问答", "Agent 工具：作为可检索的长期记忆与知识源"] },
    { icon: "⚠️", title: "常见坑", items: ["切分粒度不当导致上下文割裂或噪声过多", "只用向量检索，漏掉需精确匹配的术语与编号", "上下文塞太满，关键信息被淹没、成本飙升", "缺少观测与评估，线上退化无法及时发现"] }
  ],

  footer: "🚀 「检索定上限，生成定下限，评估定生死。先跑通链路，再逐环节增强，用数据驱动迭代。」"
};

/* ============================================================
   渲染引擎 —— 一般无需改动
   ============================================================ */
const ACCENTS = ["var(--c1)", "var(--c2)", "var(--c3)", "var(--c4)", "var(--c5)", "var(--c6)"];
const accent = i => ACCENTS[i % ACCENTS.length];
const el = (html) => { const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; };

function render(d) {
  document.body.setAttribute("data-theme", d.theme || "dark");
  document.title = d.title || "知识地图";
  const root = document.getElementById("map");
  const parts = [];

  // header
  parts.push(`<div class="km-header">
    <div class="km-title">${d.title || ""}</div>
    ${d.subtitle ? `<div class="km-subtitle">${d.subtitle}</div>` : ""}
  </div>`);

  // flow
  if (d.flow && d.flow.length) {
    parts.push(`<div class="km-flow">${d.flow.map(s => `
      <div class="km-flow-step">
        <div class="km-flow-head"><span class="km-flow-icon">${s.icon || ""}</span>
          <span class="km-flow-title">${s.index ? s.index + ". " : ""}${s.title || ""}</span></div>
        ${s.desc ? `<div class="km-flow-desc">${s.desc}</div>` : ""}
      </div>`).join("")}</div>`);
  }

  // grid
  if (d.columns && d.columns.length) {
    if (d.columnsHeading) parts.push(`<div class="km-section-h">${d.columnsHeading}<span>${d.columnsHeadingSub || ""}</span></div>`);
    const cols = d.columns.map((c, i) => `
      <div class="km-col" style="--accent:${accent(i)}">
        <div class="km-col-h">
          <div class="km-col-title">${c.index ? c.index + ". " : ""}${c.title || ""}</div>
          ${c.sub ? `<div class="km-col-sub">${c.sub}</div>` : ""}
        </div>
        ${(c.items || []).map((it, j) => `
          <div class="km-item">
            <div class="km-badge">${j + 1}</div>
            <div><div class="km-item-name">${it.name || ""}</div>
            ${it.desc ? `<div class="km-item-desc">${it.desc}</div>` : ""}</div>
          </div>`).join("")}
      </div>`).join("");
    parts.push(`<div class="km-grid" style="grid-template-columns:repeat(${d.columns.length},1fr)">${cols}</div>`);
  }

  // tags
  if (d.tags && d.tags.length) {
    if (d.tagsHeading) parts.push(`<div class="km-section-h">${d.tagsHeading}<span>${d.tagsHeadingSub || ""}</span></div>`);
    parts.push(`<div class="km-tags">${d.tags.map((t, i) => `
      <div class="km-tag" style="--accent:${accent(i)}">
        <div class="km-tag-title">${t.title || ""}</div>
        ${t.sub ? `<div class="km-tag-sub">${t.sub}</div>` : ""}
      </div>`).join("")}</div>`);
  }

  // workflows
  if (d.workflows && d.workflows.length) {
    if (d.workflowsHeading) parts.push(`<div class="km-section-h">${d.workflowsHeading}<span>${d.workflowsHeadingSub || ""}</span></div>`);
    const wfs = d.workflows.map((w, i) => `
      <div class="km-wf" style="--accent:${accent(i)}">
        <div class="km-wf-title">${w.title || ""}</div>
        ${w.flow ? `<div class="km-wf-flow">${w.flow}</div>` : ""}
        ${(w.steps || []).map((s, j) => `<div class="km-wf-step"><span class="km-wf-num">${j + 1}</span>${s}</div>`).join("")}
      </div>`).join("");
    parts.push(`<div class="km-workflows" style="grid-template-columns:repeat(${d.workflows.length},1fr)">${wfs}</div>`);
  }

  // advice
  if (d.advice && d.advice.length) {
    parts.push(`<div class="km-advice">${d.advice.map(a => `
      <div class="km-ad">
        <div class="km-ad-title">${a.icon || ""} ${a.title || ""}</div>
        ${(a.items || []).map(it => `<div class="km-ad-item"><span class="km-ad-icon">▸</span><span>${it}</span></div>`).join("")}
      </div>`).join("")}</div>`);
  }

  // footer
  if (d.footer) parts.push(`<div class="km-footer">${d.footer}</div>`);

  root.innerHTML = parts.join("");
}

render(DATA);
</script>
</body>
</html>
